<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mining Helmet Dashboard (Demo)</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header>
        <h1>Mining Worker Safety Dashboard</h1>
        <p class="sub">Demo mode using simulated data</p>
    </header>

    <section class="grid">
        <div class="card">
            <h2>Workers</h2>
            <table id="workersTable">
                <thead>
                    <tr>
                        <th>Worker</th>
                        <th>Zone</th>
                        <th>Risk</th>
                        <th>Last Update</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Incidents</h2>
            <ul id="incidentsList"></ul>
        </div>
    </section>

    <script src="mockData.js"></script>
    <script src="app.js"></script>
</body>

</html>
